<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}HeartSense ML{% endblock %}</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --card: #1c2128;
  --border: #30363d;
  --accent: #e84c4c;
  --accent2: #4c9fe8;
  --accent3: #4ce87a;
  --warn: #e8a84c;
  --text: #e6edf3;
  --muted: #8b949e;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}
nav {
  display: flex;
  align-items: center;
  gap: 2rem;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
}
.nav-brand {
  display: flex; align-items: center; gap: .6rem;
  font-size: 1.1rem; font-weight: 700; color: var(--accent);
  text-decoration: none;
}
.nav-brand svg { width:22px; height:22px; }
nav a {
  color: var(--muted); text-decoration: none;
  font-size: .92rem; padding: .3rem .7rem;
  border-radius: 6px; transition: all .2s;
}
nav a:hover, nav a.active { color: var(--text); background: var(--card); }
.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}
.badge {
  display: inline-block; font-size: .72rem; padding: .2rem .6rem;
  border-radius: 20px; font-weight: 600; letter-spacing: .03em;
}
.badge-red   { background: rgba(232,76,76,.15);  color: var(--accent);  border:1px solid rgba(232,76,76,.3); }
.badge-green { background: rgba(76,232,122,.15); color: var(--accent3); border:1px solid rgba(76,232,122,.3);}
.badge-blue  { background: rgba(76,159,232,.15); color: var(--accent2); border:1px solid rgba(76,159,232,.3);}
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .65rem 1.4rem; border-radius: 8px; border: none;
  font-size: .95rem; font-weight: 600; cursor: pointer; transition: all .2s;
  text-decoration: none;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #c93c3c; transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--card); }
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    HeartSense ML
  </a>
  <a href="/" class="{% block nav_predict %}{% endblock %}">Predict</a>
  <a href="/dashboard" class="{% block nav_dash %}{% endblock %}">Dashboard</a>
</nav>
{% block body %}{% endblock %}
</body>
</html>
